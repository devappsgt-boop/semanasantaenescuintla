<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ver recorrido</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body { margin: 0; padding: 0; }
    #map { height: 100vh; width: 100%; }

    .panel-info {
      position: absolute;
      bottom: 15px;
      left: 15px;
      background: white;
      padding: 12px 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-family: Arial, sans-serif;
      z-index: 1000;
    }

    .leyenda {
      position: absolute;
      top: 15px;
      right: 15px;
      background: white;
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-family: Arial, sans-serif;
      z-index: 1000;
    }

    .color-box {
      width: 25px;
      height: 4px;
      margin-right: 8px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Panel -->
<div class="panel-info">
  <strong>📍 Procesión en vivo</strong><br>
  Última actualización: <span id="hora">--</span><br>
  Avance del recorrido: <strong><span id="avance">0%</span></strong>
</div>

<!-- Leyenda -->
<div class="leyenda">
  <strong>Recorrido</strong><br>
  <div><span class="color-box" style="background:blue;"></span> Ida</div>
  <div><span class="color-box" style="background:red;"></span> Regreso</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.js"></script>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyzEXUcJIlVNT1OKmlF_BeothFwXnR4HZ5kSPW9Bwh7htqVtEz8zIgDcnjYLh1D8mvnRA/exec";

// ================= MAPA =================
const map = L.map('map').setView([14.3009, -90.7875], 16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

// ================= ICONO =================
const iconoProcesion = L.icon({
  iconUrl: 'anda.png',
  iconSize: [36, 36],
  iconAnchor: [18, 36]
});

// ================= RUTAS =================
const rutaIda = [
  [14.30121528896382, -90.78618065786368],
  [14.300663563221848, -90.7862548083143],
  [14.300825231833766, -90.78738295443905],
  [14.299737315942695, -90.78753221551439],
  [14.298710499776067, -90.78768147309685],
  [14.298402756590876, -90.78777224434847],
  [14.298661942161694, -90.78853758293158],
  [14.298720964580703, -90.78857200995874],
  [14.299226503748407, -90.79064292612809],
  [14.2997012476179, -90.79047343938484]
];

const rutaRegreso = [
  [14.299709186821463, -90.79046267127316],
  [14.299177746216476, -90.78848461839965],
  [14.300985427064516, -90.7881767699471],
  [14.300716182723013, -90.78629182738803],
  [14.301243798272095, -90.78622745437481]
];

const rutaCompleta = rutaIda.concat(rutaRegreso);

// ================= DIBUJAR =================
const lineaIda = L.polyline(rutaIda, { color: "blue", weight: 3 }).addTo(map);
const lineaRegreso = L.polyline(rutaRegreso, {
  color: "red",
  weight: 3,
  dashArray: "8,6"
}).addTo(map);

// Flechas
L.polylineDecorator(lineaIda, {
  patterns: [{ offset: 25, repeat: 60, symbol: L.Symbol.arrowHead({ pixelSize: 8, pathOptions: { color: 'blue' }}) }]
}).addTo(map);

L.polylineDecorator(lineaRegreso, {
  patterns: [{ offset: 25, repeat: 60, symbol: L.Symbol.arrowHead({ pixelSize: 8, pathOptions: { color: 'red' }}) }]
}).addTo(map);

map.fitBounds(L.featureGroup([lineaIda, lineaRegreso]).getBounds());

// ================= MARCADOR TIEMPO REAL =================
let markerTiempoReal = L.marker([14.3009, -90.7875], { icon: iconoProcesion }).addTo(map);

// ================= FUNCIONES =================

// Distancia entre dos puntos
function distancia(a, b) {
  const dx = a[0] - b[0];
  const dy = a[1] - b[1];
  return Math.sqrt(dx*dx + dy*dy);
}

// Calcular porcentaje recorrido
function calcularAvance(pos) {
  let total = 0;
  let recorrido = 0;

  for (let i = 0; i < rutaCompleta.length - 1; i++) {
    const seg = distancia(rutaCompleta[i], rutaCompleta[i+1]);
    total += seg;

    if (distancia(pos, rutaCompleta[i+1]) < 0.0005) {
      recorrido += seg;
    }
  }

  return Math.min(100, Math.round((recorrido / total) * 100));
}

function actualizarHora() {
  document.getElementById("hora").innerText =
    new Date().toLocaleTimeString();
}

async function actualizarUbicacion() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (data.lat && data.lng) {
      const pos = [data.lat, data.lng];
      markerTiempoReal.setLatLng(pos);
      actualizarHora();

      const avance = calcularAvance(pos);
      document.getElementById("avance").innerText = avance + "%";
    }
  } catch (error) {
    console.error("Error:", error);
  }
}

setInterval(actualizarUbicacion, 5000);
actualizarUbicacion();

</script>

</body>
</html>
