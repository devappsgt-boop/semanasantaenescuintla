<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ver recorrido</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body { margin: 0; padding: 0; }
    #map { height: 100vh; width: 100%; }

    .panel-info {
      position: absolute;
      bottom: 15px;
      left: 15px;
      background: white;
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-family: Arial, sans-serif;
      z-index: 1000;
    }

    .leyenda {
      position: absolute;
      top: 15px;
      right: 15px;
      background: white;
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-family: Arial, sans-serif;
      z-index: 1000;
    }

    .linea {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
    }

    .color-box {
      width: 25px;
      height: 5px;
      margin-right: 8px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Panel hora -->
<div class="panel-info">
  <strong>📍 Procesión en vivo</strong><br>
  Última actualización:<br>
  <span id="hora">Esperando datos...</span>
</div>

<!-- Leyenda -->
<div class="leyenda">
  <strong>Recorrido</strong>
  <div class="linea">
    <div class="color-box" style="background: blue;"></div> Ida
  </div>
  <div class="linea">
    <div class="color-box" style="background: red;"></div> Regreso
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.js"></script>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyzEXUcJIlVNT1OKmlF_BeothFwXnR4HZ5kSPW9Bwh7htqVtEz8zIgDcnjYLh1D8mvnRA/exec";

// =========================
// MAPA
// =========================
const map = L.map('map').setView([14.3009, -90.7875], 16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

// =========================
// ICONO PERSONALIZADO
// =========================
const iconoProcesion = L.icon({
  iconUrl: 'anda.png',
  iconSize: [40, 40],
  iconAnchor: [20, 40],
});

// =========================
// RUTAS
// =========================
const rutaIda = [
  [14.30121528896382, -90.78618065786368],
  [14.300663563221848, -90.7862548083143],
  [14.300825231833766, -90.78738295443905],
  [14.299737315942695, -90.78753221551439],
  [14.298710499776067, -90.78768147309685],
  [14.298402756590876, -90.78777224434847],
  [14.298661942161694, -90.78853758293158],
  [14.298720964580703, -90.78857200995874],
  [14.299226503748407, -90.79064292612809],
  [14.2997012476179, -90.79047343938484]
];

const rutaRegreso = [
  [14.299709186821463, -90.79046267127316],
  [14.299177746216476, -90.78848461839965],
  [14.300985427064516, -90.7881767699471],
  [14.300716182723013, -90.78629182738803],
  [14.301243798272095, -90.78622745437481]
];

// Líneas
const lineaIda = L.polyline(rutaIda, { color: "blue", weight: 5 }).addTo(map);
const lineaRegreso = L.polyline(rutaRegreso, {
  color: "red",
  weight: 5,
  dashArray: "8,6"
}).addTo(map);

// Flechas dirección
L.polylineDecorator(lineaIda, {
  patterns: [
    { offset: 25, repeat: 50, symbol: L.Symbol.arrowHead({ pixelSize: 10, pathOptions: { color: 'blue' }}) }
  ]
}).addTo(map);

L.polylineDecorator(lineaRegreso, {
  patterns: [
    { offset: 25, repeat: 50, symbol: L.Symbol.arrowHead({ pixelSize: 10, pathOptions: { color: 'red' }}) }
  ]
}).addTo(map);

// Ajustar vista
const grupoRutas = L.featureGroup([lineaIda, lineaRegreso]);
map.fitBounds(grupoRutas.getBounds());

// Marcadores
L.marker(rutaIda[0]).addTo(map).bindPopup("Salida");
L.marker(rutaRegreso[rutaRegreso.length - 1]).addTo(map).bindPopup("Ingreso");

// =========================
// UBICACIÓN EN TIEMPO REAL
// =========================
let markerTiempoReal = L.marker([14.3009, -90.7875], { icon: iconoProcesion })
  .addTo(map)
  .bindPopup("Procesión en vivo");

function actualizarHora() {
  document.getElementById("hora").innerText =
    new Date().toLocaleTimeString();
}

async function actualizarUbicacion() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (data.lat && data.lng) {
      markerTiempoReal.setLatLng([data.lat, data.lng]);
      actualizarHora();
    }
  } catch (error) {
    console.error("Error:", error);
  }
}

setInterval(actualizarUbicacion, 5000);
actualizarUbicacion();
</script>

</body>
</html>
