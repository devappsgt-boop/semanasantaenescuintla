<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ver recorrido</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    #map { height: 100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyzEXUcJIlVNT1OKmlF_BeothFwXnR4HZ5kSPW9Bwh7htqVtEz8zIgDcnjYLh1D8mvnRA/exec";

const map = L.map('map').setView([14.6349, -90.5069], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let marker = L.marker([14.6349, -90.5069]).addTo(map);

// Actualizar cada 5 segundos
setInterval(async () => {
  const res = await fetch(API_URL);
  const data = await res.json();

  if (data.lat) {
    marker.setLatLng([data.lat, data.lng]);
    map.panTo([data.lat, data.lng]);
  }
}, 5000);
</script>
</script>

</body>
</html>
