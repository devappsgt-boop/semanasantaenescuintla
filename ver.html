<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ver recorrido</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
html,body{margin:0;padding:0;}
#map{height:100vh;width:100%;}
.panel-info{
position:absolute;bottom:15px;left:15px;background:white;
padding:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);
font-family:Arial;z-index:1000;font-size:14px;
}
</style>
</head>

<body>
<div id="map"></div>

<div class="panel-info">
<strong id="nombreProcesion">Esperando procesión...</strong><br>
Estado: <span id="estadoTexto">--</span><br>
Última actualización: <span id="ultima"></span>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

const API_URL="PEGA_AQUI_TU_URL";

let map=L.map('map').setView([14.3009,-90.7875],16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

let lineaIda=null;
let lineaRegreso=null;
let marker=null;
let procesionCargada=null;

async function cargarRuta(id){
  if(!id) return;

  const res=await fetch(`rutas/${id}.json`);
  const data=await res.json();

  document.getElementById("nombreProcesion").innerText=data.nombre;

  if(lineaIda) map.removeLayer(lineaIda);
  if(lineaRegreso) map.removeLayer(lineaRegreso);
  if(marker) map.removeLayer(marker);

  lineaIda=L.polyline(data.ida,{color:"blue"}).addTo(map);
  lineaRegreso=L.polyline(data.regreso,{color:"red",dashArray:"6,6"}).addTo(map);

  map.fitBounds(L.featureGroup([lineaIda,lineaRegreso]).getBounds());

  marker=L.marker(data.ida[0]).addTo(map);

  procesionCargada=id;
}

async function actualizar(){
  const res=await fetch(API_URL);
  const data=await res.json();

  if(!data.procesionActiva){
    document.getElementById("estadoTexto").innerText="Sin procesión activa";
    return;
  }

  if(data.procesionActiva!==procesionCargada){
    await cargarRuta(data.procesionActiva);
  }

  document.getElementById("estadoTexto").innerText=data.estado;
  document.getElementById("ultima").innerText=
    data.ultimaActualizacion?
    new Date(data.ultimaActualizacion).toLocaleTimeString():"--";

  if(data.estado==="en_recorrido" && data.lat && data.lng){
    marker.setLatLng([data.lat,data.lng]);
  }
}

setInterval(actualizar,5000);
actualizar();

</script>
</body>
</html>
