<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Semana Santa en Escuintla</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #2e0f3a;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .card-santa {
      background: #3d1450;
      border-radius: 18px;
      padding: 35px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    .titulo {
      font-weight: bold;
      letter-spacing: 1px;
    }

    .btn-publico {
      background-color: #d4af37;
      color: black;
      font-weight: bold;
      border-radius: 10px;
      padding: 12px;
    }

    .btn-publico:hover {
      background-color: #c19d2f;
    }

    .btn-interno {
      background-color: #5a2a82;
      color: white;
      border-radius: 10px;
      padding: 12px;
    }

    .btn-interno:hover {
      background-color: #4a216d;
    }

    .nota {
      font-size: 0.85rem;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="container text-center">
  <div class="card-santa mx-auto" style="max-width: 450px;">

    <h1 class="titulo mb-3">Cuaresma y Semana Santa</h1>
    <h4 class="mb-4">Escuintla 2026</h4>

    <p class="mb-4">
      Sigue en tiempo real el recorrido procesional
    </p>

    <div class="d-grid gap-4">

      <!-- BOTÓN PÚBLICO -->
      <div>
        <a href="ver.html" class="btn btn-publico w-100">
          🗺️ Ver recorrido en vivo
        </a>
        <div class="nota mt-2">
          Disponible para todo el público
        </div>
      </div>

      <!-- BOTÓN INTERNO -->
      <div>
        <a href="seguir.html" class="btn btn-interno w-100">
          🔐 Iniciar Sesión
        </a>
        <div class="nota mt-2">
          Acceso Restringido
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
