<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Semana Santa en Escuintla</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(rgba(40,0,60,0.85), rgba(40,0,60,0.85)),
                  url('https://images.unsplash.com/photo-1520975922323-8e3d2b7a3a0a?auto=format&fit=crop&w=1400&q=60');
      background-size: cover;
      background-position: center;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .card-santa {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(6px);
    }

    .titulo {
      font-weight: bold;
      letter-spacing: 1px;
    }

    .btn-santa {
      font-size: 1.1rem;
      padding: 12px;
      border-radius: 10px;
    }

    .btn-seguir {
      background-color: #5a2a82;
      color: white;
    }

    .btn-ver {
      background-color: #d4af37;
      color: black;
      font-weight: bold;
    }

    .btn-seguir:hover {
      background-color: #4a216d;
    }

    .btn-ver:hover {
      background-color: #c19d2f;
    }
  </style>
</head>

<body>

<div class="container text-center">
  <div class="card-santa mx-auto" style="max-width: 420px;">
    <h1 class="titulo mb-3">Semana Santa</h1>
    <h4 class="mb-4">Escuintla 2026</h4>

    <p class="mb-4">
      Sigue el recorrido procesional en tiempo real y acompaña esta tradición con devoción.
    </p>

    <div class="d-grid gap-3">
      <a href="seguir.html" class="btn btn-santa btn-seguir">
        📍 Seguir recorrido procesional
      </a>

      <a href="ver.html" class="btn btn-santa btn-ver">
        🗺️ Ver recorrido procesional
      </a>
    </div>
  </div>
</div>

</body>
</html>
