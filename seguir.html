<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel de Control - Procesión</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color:#2e0f3a;color:white;min-height:100vh;display:flex;align-items:center;}
.card-panel {background:#3d1450;border-radius:18px;padding:30px;box-shadow:0 0 25px rgba(0,0,0,0.4);}
.estado-box {background:#2a0d38;padding:15px;border-radius:12px;margin-top:15px;font-size:0.9rem;}
</style>
</head>

<body>
<div class="container">
<div class="card-panel mx-auto" style="max-width:500px;">

<div id="loginBox">
<h3 class="text-center mb-4">🔐 Acceso</h3>
<input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">
<button class="btn btn-warning w-100" onclick="login()">Ingresar</button>
<p id="error" class="text-danger text-center mt-2"></p>
</div>

<div id="panel" style="display:none;">
<h4 class="text-center mb-3">Panel Procesional</h4>

<select id="procesionSelect" class="form-select mb-3"></select>

<div class="d-grid gap-2">
<button class="btn btn-primary" onclick="activarProcesion()">Activar</button>
<button class="btn btn-success" onclick="comenzarRecorrido()">Comenzar</button>
<button class="btn btn-danger" onclick="finalizarRecorrido()">Finalizar</button>
</div>

<div class="estado-box text-center">
<strong>Estado:</strong>
<div id="estadoActual">Cargando...</div>
<div id="gpsInfo"></div>
</div>

<button class="btn btn-secondary w-100 mt-3" onclick="cerrarSesion()">Cerrar</button>

</div>
</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwtFW7x0hvLcFL-kyGf4n3KVCtRQxqrFAVB7cl_r2Dai8ky_zTtOW3vbrsPDsevRK9wpg/exec";
const TOKEN = "TOKEN_SECRETO_2026";
const PASS = "procesion2026";

let watchId = null;
let gpsActivo = false;

function login(){
  const p = document.getElementById("password").value;
  if(p === PASS){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="block";
    cargarProcesiones();
    cargarEstado();
  } else {
    document.getElementById("error").innerText="Contraseña incorrecta";
  }
}

function cerrarSesion(){
  detenerGPS();
  location.reload();
}

async function cargarProcesiones(){
  const res = await fetch("./rutas/lista.json");
  const lista = await res.json();
  const select = document.getElementById("procesionSelect");
  select.innerHTML="";
  lista.forEach(p=>{
    const opt=document.createElement("option");
    opt.value=p.id;
    opt.textContent=p.nombre;
    select.appendChild(opt);
  });
}

async function enviarAccion(data){
  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({...data,token:TOKEN})
  });
}

async function activarProcesion(){
  const procesion=document.getElementById("procesionSelect").value;
  await enviarAccion({accion:"activar",procesion});
  cargarEstado();
}

async function comenzarRecorrido(){
  await enviarAccion({accion:"comenzar"});
  gpsActivo=true;
  iniciarGPS();
  cargarEstado();
}

async function finalizarRecorrido(){
  await enviarAccion({accion:"finalizar"});
  detenerGPS();
  cargarEstado();
}

async function cargarEstado(){
  const res=await fetch(API_URL);
  const data=await res.json();
  document.getElementById("estadoActual").innerText=
    `Procesión: ${data.procesionActiva||"Ninguna"} | ${data.estado}`;
}

function iniciarGPS(){
  if(navigator.geolocation){
    watchId=navigator.geolocation.watchPosition(enviarUbicacion);
  }
}

function detenerGPS(){
  if(watchId){
    navigator.geolocation.clearWatch(watchId);
    watchId=null;
    gpsActivo=false;
  }
}

async function enviarUbicacion(pos){
  if(!gpsActivo) return;

  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;

  document.getElementById("gpsInfo").innerText=
    `Lat: ${lat.toFixed(5)} | Lng: ${lng.toFixed(5)}`;

  await enviarAccion({accion:"ubicacion",lat,lng});
}
</script>
</body>
</html>
