<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel de Control - Procesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #2e0f3a;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .card-panel {
      background: #3d1450;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    .btn-activar { background-color: #6f42c1; color: white; }
    .btn-comenzar { background-color: #198754; color: white; }
    .btn-finalizar { background-color: #dc3545; color: white; }

    .estado-box {
      background: #2a0d38;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card-panel mx-auto" style="max-width: 500px;">

    <!-- LOGIN -->
    <div id="loginBox">
      <h3 class="text-center mb-4">🔐 Acceso de Encargado</h3>

      <input type="text" id="usuario" class="form-control mb-2" placeholder="Usuario">
      <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

      <button class="btn btn-warning w-100" onclick="login()">Ingresar</button>
      <p id="error" class="text-danger text-center mt-2"></p>
    </div>

    <!-- PANEL -->
    <div id="panel" style="display:none;">

      <h4 class="text-center mb-3">Panel de Control Procesional</h4>

      <label class="mb-2">Seleccionar procesión</label>
      <select id="procesionSelect" class="form-select mb-3">
        <option value="jesus-nazareno">Jesús Nazareno</option>
        <option value="virgen-dolores">Virgen de Dolores</option>
        <option value="senor-sepultado">Señor Sepultado</option>
      </select>

      <div class="d-grid gap-2">
        <button class="btn btn-activar" onclick="activarProcesion()">
          🟣 Activar procesión
        </button>

        <button class="btn btn-comenzar" onclick="comenzarRecorrido()">
          🟢 Comenzar recorrido
        </button>

        <button class="btn btn-finalizar" onclick="finalizarRecorrido()">
          🔴 Finalizar recorrido
        </button>
      </div>

      <div class="estado-box text-center mt-3">
        <strong>Estado actual:</strong>
        <div id="estadoActual">Cargando...</div>
        <div id="gpsInfo" class="mt-2"></div>
      </div>

      <button class="btn btn-secondary w-100 mt-3" onclick="cerrarSesion()">
        Cerrar sesión
      </button>

    </div>

  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwlnX9zhSakddrndVBurrMOQkbGFvQyDHHslDP6ZSn3kSI-YA7mEnfvbNTL_JsMPBtaYw/exec";

const USER = "admin";
const PASS = "procesion2026";

let gpsActivo = false;

// ===== LOGIN =====
function login() {
  const u = document.getElementById("usuario").value;
  const p = document.getElementById("password").value;

  if (u === USER && p === PASS) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
    cargarEstado();
  } else {
    document.getElementById("error").innerText = "Credenciales incorrectas";
  }
}

function cerrarSesion() {
  gpsActivo = false;
  document.getElementById("panel").style.display = "none";
  document.getElementById("loginBox").style.display = "block";
}

// ===== CONTROL =====
async function activarProcesion() {
  const procesion = document.getElementById("procesionSelect").value;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      accion: "activar",
      procesion: procesion
    })
  });

  cargarEstado();
}

async function comenzarRecorrido() {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ accion: "comenzar" })
  });

  gpsActivo = true;
  iniciarGPS();
  cargarEstado();
}

async function finalizarRecorrido() {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ accion: "finalizar" })
  });

  gpsActivo = false;
  cargarEstado();
}

// ===== ESTADO =====
async function cargarEstado() {
  const res = await fetch(API_URL);
  const data = await res.json();

  document.getElementById("estadoActual").innerText =
    `Procesión: ${data.procesionActiva || "Ninguna"} | Estado: ${data.estado}`;
}

// ===== GPS =====
function iniciarGPS() {
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(enviarUbicacion);
  }
}

async function enviarUbicacion(pos) {
  if (!gpsActivo) return;

  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  document.getElementById("gpsInfo").innerText =
    `Lat: ${lat.toFixed(5)} | Lng: ${lng.toFixed(5)}`;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      accion: "ubicacion",
      lat: lat,
      lng: lng
    })
  });
}
</script>

</body>
</html>
