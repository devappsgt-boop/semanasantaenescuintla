<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seguir Procesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <!-- LOGIN -->
  <div id="loginBox">
    <h3>Acceso autorizado</h3>

    <input type="text" id="usuario" class="form-control mb-2" placeholder="Usuario">
    <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

    <button class="btn btn-primary w-100" onclick="login()">Ingresar</button>
    <p id="error" class="text-danger mt-2"></p>
  </div>

  <!-- PANEL DE ENVÍO -->
  <div id="panel" style="display:none;">
    <h3>Enviando ubicación...</h3>
    <p id="estado">Esperando GPS...</p>
  </div>

</div>

<script>
const USER = "admin";
const PASS = "procesion2026";

function login() {
  const u = document.getElementById("usuario").value;
  const p = document.getElementById("password").value;

  if (u === USER && p === PASS) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
    iniciarGPS();
  } else {
    document.getElementById("error").innerText = "Credenciales incorrectas";
  }
}

// Obtener ubicación en tiempo real
function iniciarGPS() {
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(enviarUbicacion);
  } else {
    alert("GPS no soportado");
  }
}

const API_URL = "https://script.google.com/macros/s/AKfycbyzEXUcJIlVNT1OKmlF_BeothFwXnR4HZ5kSPW9Bwh7htqVtEz8zIgDcnjYLh1D8mvnRA/exec";

function enviarUbicacion(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  document.getElementById("estado").innerText =
    `Lat: ${lat.toFixed(5)} | Lng: ${lng.toFixed(5)}`;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      lat: lat,
      lng: lng,
      user: "admin"
    })
  });
}
</script>

</body>
</html>
