<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seguir Procesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(rgba(40,0,60,0.9), rgba(40,0,60,0.9)),
                  url('https://images.unsplash.com/photo-1507692049790-de58290a4334?auto=format&fit=crop&w=1400&q=60');
      background-size: cover;
      background-position: center;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .card-login {
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 16px;
      padding: 25px;
      backdrop-filter: blur(6px);
    }

    .btn-santa {
      background-color: #5a2a82;
      color: white;
      border-radius: 10px;
      padding: 10px;
    }

    .btn-santa:hover {
      background-color: #4a216d;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card-login mx-auto" style="max-width: 400px;">

    <!-- LOGIN -->
    <div id="loginBox">
      <h3 class="text-center mb-3">Acceso autorizado</h3>

      <input type="text" id="usuario" class="form-control mb-2" placeholder="Usuario">
      <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

      <button class="btn btn-santa w-100" onclick="login()">Ingresar</button>
      <p id="error" class="text-warning mt-2 text-center"></p>
    </div>

    <!-- PANEL GPS -->
    <div id="panel" style="display:none;" class="text-center">
      <h4>📡 Enviando ubicación</h4>
      <p id="estado">Esperando GPS...</p>
    </div>

  </div>
</div>

<script>
const USER = "admin";
const PASS = "procesion2026";

function login() {
  const u = document.getElementById("usuario").value;
  const p = document.getElementById("password").value;

  if (u === USER && p === PASS) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
    iniciarGPS();
  } else {
    document.getElementById("error").innerText = "Credenciales incorrectas";
  }
}

function iniciarGPS() {
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(enviarUbicacion);
  } else {
    alert("GPS no soportado");
  }
}

const API_URL = "https://script.google.com/macros/s/AKfycbyzEXUcJIlVNT1OKmlF_BeothFwXnR4HZ5kSPW9Bwh7htqVtEz8zIgDcnjYLh1D8mvnRA/exec";

function enviarUbicacion(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  document.getElementById("estado").innerText =
    `Lat: ${lat.toFixed(5)} | Lng: ${lng.toFixed(5)}`;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      lat: lat,
      lng: lng,
      user: "admin"
    })
  });
}
</script>

</body>
</html>
