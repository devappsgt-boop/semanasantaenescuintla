<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro de Recorrido</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #2e0f3a;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .card-login {
      background: #3d1450;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    .btn-santa {
      background-color: #d4af37;
      color: black;
      font-weight: bold;
      border-radius: 10px;
      padding: 10px;
    }

    .btn-santa:hover {
      background-color: #c19d2f;
    }

    .estado-gps {
      background-color: #2a0d38;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card-login mx-auto" style="max-width: 420px;">

    <!-- LOGIN -->
    <div id="loginBox">
      <h3 class="text-center mb-3">🔐 Acceso de Registro</h3>

      <p class="text-center mb-3" style="font-size: 0.9rem; opacity:0.8;">
        Uso exclusivo para la persona encargada de enviar la ubicación en tiempo real.
      </p>

      <input type="text" id="usuario" class="form-control mb-2" placeholder="Usuario">
      <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

      <button class="btn btn-santa w-100" onclick="login()">Ingresar</button>
      <p id="error" class="text-warning mt-2 text-center"></p>
    </div>

    <!-- PANEL GPS -->
    <div id="panel" style="display:none;">
      <h4 class="text-center">📡 Enviando ubicación en tiempo real</h4>

      <div class="estado-gps text-center">
        <p id="estado">Esperando señal GPS...</p>
      </div>
    </div>

  </div>
</div>

<script>
const USER = "admin";
const PASS = "procesion2026";

function login() {
  const u = document.getElementById("usuario").value;
  const p = document.getElementById("password").value;

  if (u === USER && p === PASS) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
    iniciarGPS();
  } else {
    document.getElementById("error").innerText = "Credenciales incorrectas";
  }
}

function iniciarGPS() {
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(enviarUbicacion);
  } else {
    alert("GPS no soportado");
  }
}

const API_URL = "https://script.google.com/macros/s/AKfycbyzEXUcJIlVNT1OKmlF_BeothFwXnR4HZ5kSPW9Bwh7htqVtEz8zIgDcnjYLh1D8mvnRA/exec";

function enviarUbicacion(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  document.getElementById("estado").innerText =
    `Lat: ${lat.toFixed(5)} | Lng: ${lng.toFixed(5)}`;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      lat: lat,
      lng: lng,
      user: "admin"
    })
  });
}
</script>

</body>
</html>
