<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel de Control - Procesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #2e0f3a;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .card-panel {
      background: #3d1450;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    .btn-activar {
      background-color: #6f42c1;
      color: white;
    }

    .btn-comenzar {
      background-color: #198754;
      color: white;
    }

    .btn-finalizar {
      background-color: #dc3545;
      color: white;
    }

    select, button {
      border-radius: 10px !important;
    }

    .estado-box {
      background: #2a0d38;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card-panel mx-auto" style="max-width: 500px;">

    <h3 class="text-center mb-4">Panel de Control Procesional</h3>

    <!-- Selector -->
    <label class="mb-2">Seleccionar procesión</label>
    <select id="procesionSelect" class="form-select mb-3">
      <option value="jesus-nazareno">Jesús Nazareno</option>
      <option value="virgen-dolores">Virgen de Dolores</option>
      <option value="senor-sepultado">Señor Sepultado</option>
    </select>

    <!-- Botones -->
    <div class="d-grid gap-2">

      <button class="btn btn-activar" onclick="activarProcesion()">
        🟣 Activar procesión
      </button>

      <button class="btn btn-comenzar" onclick="comenzarRecorrido()">
        🟢 Comenzar recorrido
      </button>

      <button class="btn btn-finalizar" onclick="finalizarRecorrido()">
        🔴 Finalizar recorrido
      </button>

    </div>

    <!-- Estado -->
    <div class="estado-box text-center mt-3">
      <strong>Estado actual:</strong>
      <div id="estadoActual">Cargando...</div>
      <div id="gpsInfo" class="mt-2"></div>
    </div>

  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwlnX9zhSakddrndVBurrMOQkbGFvQyDHHslDP6ZSn3kSI-YA7mEnfvbNTL_JsMPBtaYw/exec";

// ================== FUNCIONES ==================

async function activarProcesion() {
  const procesion = document.getElementById("procesionSelect").value;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      accion: "activar",
      procesion: procesion
    })
  });

  cargarEstado();
}

async function comenzarRecorrido() {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      accion: "comenzar"
    })
  });

  iniciarGPS();
  cargarEstado();
}

async function finalizarRecorrido() {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      accion: "finalizar"
    })
  });

  cargarEstado();
}

async function cargarEstado() {
  const res = await fetch(API_URL);
  const data = await res.json();

  document.getElementById("estadoActual").innerText =
    `Procesión: ${data.procesionActiva || "Ninguna"} | Estado: ${data.estado}`;
}

function iniciarGPS() {
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(enviarUbicacion);
  }
}

async function enviarUbicacion(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  document.getElementById("gpsInfo").innerText =
    `Lat: ${lat.toFixed(5)} | Lng: ${lng.toFixed(5)}`;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      accion: "ubicacion",
      lat: lat,
      lng: lng
    })
  });
}

// Cargar estado al abrir
cargarEstado();
</script>

</body>
</html>
